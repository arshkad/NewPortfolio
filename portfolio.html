<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arsha Anvekar — Software Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f0ff;--surface:#ffffff;--surface2:#e8e8ff;--border:#c8c0f0;--border2:#b0a8e8;
  --text:#2a2250;--muted:#6b5fa0;--dim:#a8a0cc;
  --blue:#4a6cf7;--purple:#7c3aed;--light-purple:#a78bfa;--accent:#6d48e5;
  --green:#059669;--red:#dc2626;--yellow:#d97706;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* PARTICLES CANVAS */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.5}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 48px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(240,240,255,0.92);backdrop-filter:blur(10px)}
.nav-logo{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--purple);font-weight:700}.nav-logo span{color:var(--blue)}
.nav-links{display:flex;gap:28px;font-size:13px;font-family:'JetBrains Mono',monospace}
.nav-links a{color:var(--muted);transition:color 0.15s;position:relative}.nav-links a:hover{color:var(--text);text-decoration:none}
.nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--purple);transition:width 0.2s}
.nav-links a:hover::after{width:100%}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;padding:0 48px;max-width:900px;margin:0 auto;position:relative;z-index:1}
.hero-inner{padding-top:80px}
.hero-tag{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--purple);margin-bottom:16px;letter-spacing:0.08em;background:#ede9fe;display:inline-block;padding:4px 12px;border-radius:20px;border:1px solid var(--light-purple);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,0.2)}50%{box-shadow:0 0 0 6px rgba(124,58,237,0)}}
.hero h1{font-size:clamp(36px,6vw,72px);font-weight:300;line-height:1.1;color:var(--text);letter-spacing:-0.03em;margin-bottom:8px}
.hero h1 span{color:var(--purple);font-weight:500}
.hero-sub{font-size:18px;color:var(--muted);font-weight:300;margin-bottom:32px;line-height:1.6;max-width:520px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary{background:var(--purple);color:#fff;padding:10px 24px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 14px rgba(124,58,237,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(124,58,237,0.4);text-decoration:none;opacity:1}
.btn-secondary{background:transparent;color:var(--text);padding:10px 24px;border-radius:8px;border:1px solid var(--border2);font-family:'JetBrains Mono',monospace;font-size:13px;transition:all 0.15s}
.btn-secondary:hover{border-color:var(--purple);color:var(--purple);transform:translateY(-2px);text-decoration:none}

/* TERMINAL */
.terminal{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-top:40px;overflow:hidden;max-width:560px;box-shadow:0 4px 24px rgba(124,58,237,0.08)}
.term-bar{display:flex;align-items:center;gap:6px;padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.dot{width:10px;height:10px;border-radius:50%}
.term-body{padding:16px 18px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:2}
.t-dim{color:var(--dim)}.t-purple{color:var(--purple)}.t-blue{color:var(--blue)}.t-accent{color:var(--accent)}.t-white{color:var(--text)}.t-muted{color:var(--muted)}

/* CURSOR BLINK */
.cursor{display:inline-block;width:8px;height:14px;background:var(--purple);margin-left:2px;animation:blink 1s step-end infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(30px);transition:opacity 0.6s ease,transform 0.6s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:0.1s}
.reveal-delay-2{transition-delay:0.2s}
.reveal-delay-3{transition-delay:0.3s}
.reveal-delay-4{transition-delay:0.4s}
.reveal-delay-5{transition-delay:0.5s}

/* SECTIONS */
section{padding:80px 48px;max-width:900px;margin:0 auto;position:relative;z-index:1}
.section-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--purple);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px}
.section-title{font-size:28px;font-weight:300;color:var(--text);margin-bottom:40px;letter-spacing:-0.02em}

/* SKILLS */
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.skill-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);display:flex;align-items:center;gap:8px;transition:all 0.2s;box-shadow:0 1px 4px rgba(124,58,237,0.05)}
.skill-chip:hover{border-color:var(--purple);background:#faf5ff;transform:translateY(-3px);box-shadow:0 6px 16px rgba(124,58,237,0.15)}
.skill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* PROJECTS */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;transition:all 0.25s;display:flex;flex-direction:column;gap:12px;box-shadow:0 2px 8px rgba(124,58,237,0.06)}
.project-card:hover{border-color:var(--purple);box-shadow:0 8px 32px rgba(124,58,237,0.15);transform:translateY(-4px)}
.project-card.featured{border-color:var(--purple);background:linear-gradient(135deg,#faf5ff 0%,#eff6ff 100%)}
.project-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.project-name{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--text)}
.project-live{font-size:10px;background:#ede9fe;color:var(--purple);border:1px solid var(--light-purple);border-radius:4px;padding:2px 8px;font-family:'JetBrains Mono',monospace;white-space:nowrap;animation:pulse 2s ease infinite}
.project-desc{font-size:13px;color:var(--muted);line-height:1.7;flex:1}
.project-tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--blue);background:#eff6ff;border:1px solid #bfdbfe;border-radius:4px;padding:2px 8px;transition:all 0.15s}
.tag:hover{background:#dbeafe;border-color:var(--blue)}
.project-links{display:flex;gap:12px;margin-top:4px}
.project-links a{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);transition:color 0.15s}
.project-links a:hover{color:var(--purple);text-decoration:none}
